services:
  autoeval:
    build: .
    env_file: .env
    environment:
      - AGENT_MODEL=${AGENT_MODEL:-gpt-5.4}
      - TAU2_DATA_DIR=/tau2_data
    volumes:
      # Mount all editable files so changes take effect without rebuilding
      - ./agent:/app/agent
      - ./workspace:/app/workspace
      - ./experiment_config.yaml:/app/experiment_config.yaml
      - ./benchmark.py:/app/benchmark.py
      - ./gating.py:/app/gating.py
      - ./prepare.py:/app/prepare.py
      - ./record.py:/app/record.py
      # TAU2_DATA_DIR has two layers: the host-side substitution here controls which
      # directory is mounted; the container always sees it as /tau2_data (set above
      # in environment:). To use a different data directory, set TAU2_DATA_DIR in .env.
      - ${TAU2_DATA_DIR:-./tau2_data}:/tau2_data
    stdin_open: true
    tty: true
